<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0 0 32 32'%3E%3Crect%20width='32'%20height='32'%20rx='6'%20fill='%23131315'/%3E%3Cpath%20d='M6%2016h3l2-6%204%2014%203-10%202%205h6'%20fill='none'%20stroke='%23ffc688'%20stroke-width='2'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caled Boukari, Ingénieur du son (Cinéma &amp; Live)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="dns-prefetch" href="https://portfolio-du-grf-hafiz.onrender.com" />
    <link rel="preconnect" href="https://portfolio-du-grf-hafiz.onrender.com" crossorigin />
    <script>
      (function() {
        try {
          var t = localStorage.getItem('theme');
          var html = document.documentElement;
          html.classList.remove('light', 'dark');
          if (t === 'light') {
            html.classList.add('light');
          } else {
            html.classList.add('dark');
          }
        } catch {}
      })();
    </script>
    <script>
      (function() {
        var API = '/api';
        var lang = 'fr';
        try { lang = localStorage.getItem('lang') || 'fr'; } catch {}
        window.__PRELOADED__ = { data: null, translations: null };
        fetch(API + '/public/all').then(function(r) { return r.json(); }).then(function(res) {
          if (res && res.status === 'ok') window.__PRELOADED__.data = res.data;
        }).catch(function() {});
        var tcKey = 'i18n_cache_' + lang;
        try {
          var raw = localStorage.getItem(tcKey);
          if (raw) {
            var parsed = JSON.parse(raw);
            if (Date.now() - parsed.ts < 86400000) {
              window.__PRELOADED__.translations = parsed.data;
              return;
            }
          }
        } catch {}
        fetch(API + '/translations/' + lang).then(function(r) { return r.json(); }).then(function(res) {
          if (res && res.status === 'ok' && Array.isArray(res.data)) {
            var map = {};
            for (var i = 0; i < res.data.length; i++) map[res.data[i].key] = res.data[i].value;
            window.__PRELOADED__.translations = map;
            try { localStorage.setItem(tcKey, JSON.stringify({ ts: Date.now(), data: map })); } catch {}
          }
        }).catch(function() {});
      })();
    </script>
    <style>
      .sk{border-radius:6px;animation:sh 1.5s infinite;background-size:200% 100%}
      .dark .sk{background:linear-gradient(90deg,#1a1a1a 25%,#252525 50%,#1a1a1a 75%)}
      .light .sk{background:linear-gradient(90deg,#e5e0db 25%,#ece8e3 50%,#e5e0db 75%)}
      @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
      .skeleton{padding:0 24px;max-width:1200px;margin:0 auto;min-height:100vh}
      .dark .skeleton{background:#09090b}
      .light .skeleton{background:#fdf8f4}
    </style>
  </head>
  <body>
    <div id="root">
      <div class="skeleton">
        <div style="display:flex;align-items:center;gap:16px;padding:20px 0">
          <div class="sk" style="height:40px;width:40px;border-radius:50%"></div>
          <div style="flex:1;display:flex;gap:24px">
            <div class="sk" style="height:14px;width:80px"></div>
            <div class="sk" style="height:14px;width:80px"></div>
            <div class="sk" style="height:14px;width:80px"></div>
          </div>
        </div>
        <div style="padding:80px 0 40px">
          <div class="sk" style="height:14px;width:100px"></div>
          <div class="sk" style="height:56px;width:60%;margin-top:20px"></div>
          <div class="sk" style="height:18px;width:80%;margin-top:20px"></div>
          <div class="sk" style="height:18px;width:55%;margin-top:10px"></div>
          <div class="sk" style="height:48px;width:160px;margin-top:32px;border-radius:24px"></div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:24px">
          <div class="sk" style="height:180px"></div>
          <div class="sk" style="height:180px"></div>
          <div class="sk" style="height:180px"></div>
          <div class="sk" style="height:180px"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
