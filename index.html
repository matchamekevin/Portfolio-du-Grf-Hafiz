<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='6'%20fill='%23131315'/%3E%3Cpath%20d='M6%2016h3l2-6%204%2014%203-10%202%205h6'%20fill='none'%20stroke='%23ffc688'%20stroke-width='2'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caled Boukari, Ingénieur du son (Cinéma &amp; Live)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      (function() {
        try {
          var t = localStorage.getItem('theme');
          var html = document.documentElement;
          html.classList.remove('light', 'dark');
          if (t === 'light') {
            html.classList.add('light');
          } else {
            html.classList.add('dark');
          }
        } catch {}
      })();
    </script>
    <style>.sk{background:linear-gradient(90deg,#1a1a1a 25%,#252525 50%,#1a1a1a 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:6px}@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}#root:empty{min-height:100vh}</style>
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;background:#0d0d0d;padding:48px 24px;max-width:1200px;margin:0 auto">
        <div style="height:12px;width:120px" class="sk"></div>
        <div style="height:12px;width:200px;margin-top:12px" class="sk"></div>
        <div style="height:48px;width:60%;margin-top:32px" class="sk"></div>
        <div style="height:16px;width:80%;margin-top:16px" class="sk"></div>
        <div style="height:16px;width:60%;margin-top:8px" class="sk"></div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:48px">
          <div style="height:200px" class="sk"></div>
          <div style="height:200px" class="sk"></div>
          <div style="height:200px" class="sk"></div>
          <div style="height:200px" class="sk"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
